version: 2

multi-ecosystem-groups:
  dependencies:
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps)"

updates:
  - package-ecosystem: github-actions
    directory: /
    patterns: ["*"]
    multi-ecosystem-group: dependencies
    cooldown:
      default-days: 7

  - package-ecosystem: cargo
    directory: /
    patterns: ["*"]
    multi-ecosystem-group: dependencies
    cooldown:
      default-days: 7

  - package-ecosystem: cargo
    directory: /crates/chimaera-app
    patterns: ["*"]
    multi-ecosystem-group: dependencies
    cooldown:
      default-days: 7

  - package-ecosystem: npm
    directory: /web-ui
    patterns: ["*"]
    multi-ecosystem-group: dependencies
    cooldown:
      default-days: 7
    # TypeScript 7 publishes only a version shim at its stable package entry;
    # svelte-check still requires the TypeScript 5 compiler API.
    ignore:
      - dependency-name: typescript
        versions: [">=7 <8"]

  - package-ecosystem: npm
    directory: /crates/chimaera-app
    patterns: ["*"]
    multi-ecosystem-group: dependencies
    cooldown:
      default-days: 7
