name: cla

# Repository-owned CLA gate. The trusted default-branch script talks directly
# to GitHub's API; no third-party CLA service/action receives contributor data.
# Signatures remain in the existing cla-signatures branch and old
# contributor-assistant records stay compatible.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: write # update signatures/version1/cla.json on cla-signatures
  pull-requests: write # create/update the one CLA guidance comment
  statuses: write # update the PR head's stable `cla` status context

# Two contributors can sign within seconds of each other. Serialize every CLA
# event for a PR so an older run can never publish failure after the run that
# recorded the final signature. Signature writes are never cancelled midway.
concurrency:
  group: cla-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  cla:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'issue_comment' && github.event.issue.pull_request &&
        (github.event.comment.body == 'recheck' ||
         github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')) ||
      github.event_name == 'pull_request_target'
    steps:
      # pull_request_target is privileged. Checkout v7's default-branch
      # protection is left on, the ref is explicit, credentials are discarded,
      # and no fork-controlled code or dependency is ever executed.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
      - name: Check contributor license agreement
        run: node .github/scripts/cla.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
