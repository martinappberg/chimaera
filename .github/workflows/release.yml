name: release

# Tag v* -> a DRAFT GitHub Release. The macOS app is built AND SIGNED by
# tauri-action, which also emits the updater manifest (latest.json) the
# installed app polls to auto-update; the static musl daemon binaries (the
# HPC story) attach to the same release. Draft so a human reads the notes
# and presses publish.
#
# Requires two repo secrets for update signing (see CONTRIBUTING.md):
#   TAURI_SIGNING_PRIVATE_KEY           the minisign private key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  its password ("" if none)
# Without them the app still builds but produces no valid update signature.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Build + sign the app and CREATE the draft release (tauri-action owns it).
  app:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/chimaera-app
      - run: npm install
        working-directory: crates/chimaera-app
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/chimaera-app
          tagName: ${{ github.ref_name }}
          releaseName: "Chimaera ${{ github.ref_name }}"
          releaseDraft: true
          # Emits and uploads latest.json (the updater endpoint) because the
          # app config sets createUpdaterArtifacts.
          includeUpdaterJson: true

  # Static musl daemon binaries — the ones you scp to a cluster.
  daemon:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-musl, aarch64-unknown-linux-musl]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: npm install
        working-directory: web-ui
      - run: npm run build
        working-directory: web-ui
      - run: rustup show
      - uses: mlugg/setup-zig@v2
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-zigbuild
      - run: cargo zigbuild --release --target ${{ matrix.target }} -p chimaera
      - run: cp target/${{ matrix.target }}/release/chimaera chimaera-${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: chimaera-${{ matrix.target }}
          path: chimaera-${{ matrix.target }}

  daemon-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: npm install
        working-directory: web-ui
      - run: npm run build
        working-directory: web-ui
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p chimaera
      - run: cp target/release/chimaera chimaera-aarch64-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: chimaera-aarch64-apple-darwin
          path: chimaera-aarch64-apple-darwin

  # Attach the daemon binaries to the release tauri-action created.
  attach-daemons:
    needs: [app, daemon, daemon-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            artifacts/chimaera-x86_64-unknown-linux-musl \
            artifacts/chimaera-aarch64-unknown-linux-musl \
            artifacts/chimaera-aarch64-apple-darwin \
            --repo "${{ github.repository }}" --clobber
