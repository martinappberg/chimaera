name: release

# NOT every merge cuts a release. scripts/version-bump.sh decides from the squash
# SUBJECT (Conventional Commits): feat -> minor, fix|perf|revert -> patch, `!` ->
# major, and refactor|chore|docs|test|ci|build|style (and [skip release]) -> NO
# release. Subject-anchored on purpose, so a folded PR body can't flip the bump or
# skip a release. Full policy + rationale: docs/agent-guides/releases.md (the single
# source); the bump logic is characterization-tested by scripts/version-bump.test.sh
# in ci.yml. A single workflow does version + build + publish: a tag pushed by
# GITHUB_TOKEN cannot trigger a second workflow, so the release cannot be split.
#
# Releases are PUBLISHED (not draft) so the installed app auto-updates; the
# required-CI branch protection on main is the safety gate that a merge is
# already green. App update signing needs TAURI_SIGNING_PRIVATE_KEY[_PASSWORD]
# repo secrets (see CONTRIBUTING.md); auto-update only resolves once the repo
# (or its releases) is public.
on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency: release

jobs:
  version:
    runs-on: ubuntu-latest
    # No job-level skip gate: the script owns the decision (incl. [skip release]
    # and the no-release types) and emits `release=false`; downstream build/publish
    # jobs are gated on `needs.version.outputs.release == 'true'`.
    outputs:
      release: ${{ steps.bump.outputs.release }}
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: bump
        run: |
          latest=$(git tag --list 'v*' --sort=-v:refname | head -1)
          subject=$(git log -1 --pretty=%s)
          result=$(bash scripts/version-bump.sh "$latest" "$subject")
          if [ "$result" = "skip" ]; then
            echo "no release for: $subject"
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "releasing v$result (from: $subject)"
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "version=$result" >> "$GITHUB_OUTPUT"
          fi

  daemon:
    needs: version
    if: needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-musl, aarch64-unknown-linux-musl]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: npm install
        working-directory: web-ui
      - run: npm run build
        working-directory: web-ui
      - run: rustup show
      - uses: mlugg/setup-zig@v2
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-zigbuild
      # Stamp the release version so the daemon reports it (health / manifest).
      - run: sed -i "s/^version = \"0.0.1\"/version = \"${{ needs.version.outputs.version }}\"/" Cargo.toml
      - run: cargo zigbuild --release --target ${{ matrix.target }} -p chimaera
      - run: cp target/${{ matrix.target }}/release/chimaera chimaera-${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: chimaera-${{ matrix.target }}
          path: chimaera-${{ matrix.target }}

  daemon-macos:
    needs: version
    if: needs.version.outputs.release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: npm install
        working-directory: web-ui
      - run: npm run build
        working-directory: web-ui
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - run: sed -i "" "s/^version = \"0.0.1\"/version = \"${{ needs.version.outputs.version }}\"/" Cargo.toml
      - run: cargo build --release -p chimaera
      - run: cp target/release/chimaera chimaera-aarch64-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: chimaera-aarch64-apple-darwin
          path: chimaera-aarch64-apple-darwin

  # Build + sign the app and CREATE + PUBLISH the release (tauri-action owns
  # it, and emits latest.json because the app config sets createUpdaterArtifacts).
  app:
    needs: version
    if: needs.version.outputs.release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/chimaera-app
          # A no-op today (rust-cache's default key is the job name, `app`), but
          # pinned so a future rename of this job cannot silently stop app.yml's
          # PR build from restoring this cache. This job runs only on main, so
          # it is the writer; rust-cache's default `save-if: true` is correct.
          shared-key: app
      - run: npm install
        working-directory: crates/chimaera-app
      # The app version drives both the bundle and the updater comparison.
      # The root workspace version is stamped too so chimaera-core::VERSION —
      # which the app reads to auto-fetch the matching remote daemon from this
      # release — reports the release version, not the "0.0.1" dev sentinel.
      - run: |
          sed -i "" "s/\"version\": \"0.0.1\"/\"version\": \"${{ needs.version.outputs.version }}\"/" crates/chimaera-app/tauri.conf.json
          sed -i "" "s/^version = \"0.0.1\"/version = \"${{ needs.version.outputs.version }}\"/" crates/chimaera-app/Cargo.toml
          sed -i "" "s/^version = \"0.0.1\"/version = \"${{ needs.version.outputs.version }}\"/" Cargo.toml
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/chimaera-app
          tagName: v${{ needs.version.outputs.version }}
          releaseName: "chimaera v${{ needs.version.outputs.version }}"
          releaseDraft: false
          includeUpdaterJson: true

  # Linux + Windows app bundles join the SAME release, as ONE matrix so the
  # recipe cannot drift per-OS. Deliberately serialized (app -> linux ->
  # windows via max-parallel): every tauri-action run does a read-modify-write
  # on the shared latest.json updater manifest, and concurrent jobs have a
  # documented race (tauri-action #409/#927/#1270) that silently ships a
  # latest.json missing a platform — which breaks that platform's auto-update
  # invisibly. Slower, always correct.
  app-bundles:
    needs: [version, app]
    if: needs.version.outputs.release == 'true'
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        # GNU sed + one quoting dialect everywhere (Git-for-Windows bash).
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/chimaera-app
          # Writer for the per-OS app caches app.yml's bundle matrix restores
          # (rust-cache keys include the OS; same pairing as the macOS `app`
          # job above).
          shared-key: app
      - run: npm install
        working-directory: crates/chimaera-app
      # Same three stamps as the macOS app job (GNU sed, no BSD -i "").
      - run: |
          sed -i "s/\"version\": \"0.0.1\"/\"version\": \"${{ needs.version.outputs.version }}\"/" crates/chimaera-app/tauri.conf.json
          sed -i "s/^version = \"0.0.1\"/version = \"${{ needs.version.outputs.version }}\"/" crates/chimaera-app/Cargo.toml
          sed -i "s/^version = \"0.0.1\"/version = \"${{ needs.version.outputs.version }}\"/" Cargo.toml
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/chimaera-app
          tagName: v${{ needs.version.outputs.version }}
          releaseName: "chimaera v${{ needs.version.outputs.version }}"
          releaseDraft: false
          includeUpdaterJson: true

  # Attach the daemon binaries to the release tauri-action published.
  attach-daemons:
    needs: [version, app, daemon, daemon-macos]
    if: needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.version.outputs.version }}" \
            artifacts/chimaera-x86_64-unknown-linux-musl \
            artifacts/chimaera-aarch64-unknown-linux-musl \
            artifacts/chimaera-aarch64-apple-darwin \
            --repo "${{ github.repository }}" --clobber
