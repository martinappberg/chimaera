name: pages

# Publishes the marketing + docs site in `site/` to GitHub Pages. Static
# files only (no build step) — the site is hand-written HTML/CSS/JS with the
# fonts vendored in, so this just uploads the directory as a Pages artifact.
#
# ONE-TIME SETUP: repo Settings → Pages → Build and deployment → Source:
# "GitHub Actions". After that every push to main that touches `site/`
# (re)deploys to the configured custom domain, https://chimaera.sh/.
#
# `[skip release]` note doesn't apply here — this workflow never cuts a
# release; it's independent of release.yml.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-flight deploy; let the newest queue behind it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
