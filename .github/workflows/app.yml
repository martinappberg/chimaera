name: app

# PR build-check for the native-shell bundle (Tauri) on all three desktop
# platforms — one matrix so the build recipe can never drift per-OS. It lives
# in its own cargo workspace, so ci.yml's root-workspace clippy never touches
# it — this catches app breakage before merge. The windows leg is the ONLY
# compile gate for the app's cfg(windows) code paths (macOS dev machines
# cannot cross-check them: dependency C builds need the Windows SDK).
# release.yml builds and publishes on merge, so no main-push trigger here.
#
# `ready_for_review` is in `types` (which overrides the default set, so the
# defaults are respelled) purely so promoting a draft re-triggers the build
# the draft guard below skipped. Without it, a draft PR marked ready would
# never build the app until its next push.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "crates/chimaera-app/**"
      - "web-ui/**"
      - ".github/workflows/app.yml"
  workflow_dispatch:

# macOS runners are the scarcest resource here (5 concurrent, 5 min a build):
# never leave an obsolete bundle building after a new commit supersedes it.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bundle:
    # Don't spend runners on a draft. Safe *only* because these are not
    # required status checks — a required check that never reports would
    # block the PR forever on "Expected — waiting for status".
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: chimaera-macos-arm64.dmg
            bundle: crates/chimaera-app/target/release/bundle/dmg/*.dmg
          # ubuntu-22.04 on purpose: AppImages inherit the build host's glibc
          # floor, and release.yml builds on 22.04 — checking on a newer
          # image could go green while the release build (or an older user
          # distro) fails.
          - os: ubuntu-22.04
            artifact: chimaera-linux-x86_64.AppImage
            bundle: crates/chimaera-app/target/release/bundle/appimage/*.AppImage
          - os: windows-latest
            artifact: chimaera-windows-x64-setup.exe
            bundle: crates/chimaera-app/target/release/bundle/nsis/*.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        # One shell everywhere; on Windows this also sidesteps pwsh quoting
        # for the JSON --config argument.
        shell: bash
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: crates/chimaera-app/package-lock.json
      # Tauri v2's documented webkit2gtk-4.1 prerequisite set.
      - if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - run: rustup show
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: crates/chimaera-app
          # rust-cache keys include the OS, so "app" pairs each leg with the
          # per-OS cache release.yml's app jobs write on main.
          shared-key: app
          # Main saves, PRs restore. A PR-scoped cache is unreadable by every
          # other PR yet still burns the repo's 10 GiB LRU quota.
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: npm ci
        working-directory: crates/chimaera-app
      - run: cargo test
        working-directory: crates/chimaera-app
      # tauri's beforeBuildCommand installs and builds web-ui;
      # setup-node above guarantees it sees a modern node — the UI build
      # needs >= 18 (styleText), which is why .nvmrc exists. The windows
      # overlay SKIPS that command: nothing in the Windows bundle consumes
      # web-ui/dist (chimaera-server, its only consumer, is cfg(unix)).
      #
      # createUpdaterArtifacts is forced off here: this check only proves the
      # app compiles and bundles. The signed updater artifact needs
      # TAURI_SIGNING_PRIVATE_KEY, which is a release-only concern
      # (release.yml on main) — a PR must not require it.
      - run: npx tauri build --config '{"bundle":{"createUpdaterArtifacts":false}}'
        working-directory: crates/chimaera-app
      # The bundle is the shippable artifact; the raw .app is a directory
      # with symlinks that artifact-zipping would flatten.
      #
      # macOS is unsigned until Apple signing lands: to sign + notarize, add
      # APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_SIGNING_IDENTITY
      # / APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID as repo secrets and export
      # them on the build step (tauri picks them up).
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.bundle }}
