name: app

# PR build-check for the native-shell bundle (Tauri). It lives in its own
# cargo workspace, so ci.yml's root-workspace clippy never touches it — this
# catches app breakage before merge. macOS runners are expensive, so it only
# runs on PRs that change the app or the UI it embeds (release.yml builds and
# publishes the app on merge, so no main-push trigger here).
on:
  pull_request:
    paths:
      - "crates/chimaera-app/**"
      - "web-ui/**"
      - ".github/workflows/app.yml"
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/chimaera-app
      - run: npm install
        working-directory: crates/chimaera-app
      # tauri's beforeBuildCommand builds web-ui (npm install + vite build);
      # setup-node above guarantees it sees a modern node — the UI build
      # needs >= 18 (styleText), which is why .nvmrc exists.
      - run: npx tauri build
        working-directory: crates/chimaera-app
      # The .dmg is the shippable artifact; the raw .app is a directory with
      # symlinks that artifact-zipping would flatten.
      #
      # Unsigned until Apple signing lands: to sign + notarize, add
      # APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_SIGNING_IDENTITY
      # / APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID as repo secrets and export
      # them on the build step (tauri picks them up).
      - uses: actions/upload-artifact@v4
        with:
          name: Chimaera-macos-arm64.dmg
          path: crates/chimaera-app/target/release/bundle/dmg/*.dmg
